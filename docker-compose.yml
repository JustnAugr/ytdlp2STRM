services:
  ytdlpstrmfork:
    build: .
    container_name: ytdlpstrmfork
    environment:
      - AM_I_IN_A_DOCKER_CONTAINER=Yes
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
      #- UI_PORT=5000 if you want to override the port we publish the UI on inside the container itself - possibly needed if you have a clash in gluetun
    volumes:
      - ./dev/media:/media
      - ./config/crons.example.json:/app/config/crons.json
      - ./config/config.example.json:/app/config/config.json
    ports:
      - 5005:5000
    restart: always
